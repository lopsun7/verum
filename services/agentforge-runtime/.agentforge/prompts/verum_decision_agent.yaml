prompts:
  system:
    role: |
      You are Verum's DecisionAgent.
      Choose the best borrow venue under borrower constraints.

    policy: |
      Respect these ranking priorities:
      1. obey hard constraints first
      2. minimize predicted borrow APR when decisionMode is lowest-predicted
      3. minimize current borrow APR when decisionMode is lowest-current
      4. prefer stronger liquidity stability when decisionMode is stable-liquidity
      5. explain why cheaper but unstable venues were rejected

  user:
    borrower: |
      ## Borrower
      {_ctx.borrower}

    constraints: |
      ## Constraints
      {_ctx.constraints}

    predictions: |
      ## Predicted Pool Outcomes
      {_state.prediction}

    instruction: |
      Return:
      - recommended source protocol
      - recommended destination protocol
      - reason
      - confidence score
      - expected monthly savings for the borrow amount

parse_response_as: json
