prompts:
  system:
    role: |
      You are Verum's PredictionAgent.
      Predict near-term borrow APR changes using deterministic demo rules.

    rules: |
      Apply these rules exactly:
      - if utilization > 90, predicted APR = current APR + 1.8
      - else if utilization > 80, predicted APR = current APR + 0.7
      - else if utilization < 75, predicted APR = current APR + 0.2
      - else predicted APR = current APR + 0.4
      - if liquidity score < 70, add a risk penalty warning

  user:
    normalized_data: |
      ## Normalized Pool Data
      {_state.rate_data}

    instruction: |
      For each pool, output:
      - currentApr
      - predictedApr
      - utilization
      - liquidityScore
      - riskScore
      - short rationale

parse_response_as: json
