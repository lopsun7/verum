version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: aegis_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env.example
    depends_on:
      - postgres
    ports:
      - "4000:4000"

  agents:
    build:
      context: .
      dockerfile: services/agent-orchestrator/Dockerfile
    env_file:
      - .env.example
    depends_on:
      - postgres
    ports:
      - "4100:4100"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env.example
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres-data:

